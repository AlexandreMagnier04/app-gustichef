name: CI/CD

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  lint-and-tests:
    name: Lint & Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: gustichef
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/gustichef
      BETTER_AUTH_SECRET: ci-secret-not-for-production
      ORIGIN: http://localhost:4173

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check

      - name: Create .env.test for CI
        run: |
          echo "DATABASE_URL=postgresql://ci:ci@localhost:5432/gustichef" > .env.test
          echo "BETTER_AUTH_SECRET=ci-secret-not-for-production" >> .env.test
          echo "ORIGIN=http://localhost:4173" >> .env.test

      - name: Push DB schema
        run: pnpm db:push --force

      - name: Tests
        run: pnpm test:ci
        env:
          CI: true

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: lint-and-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          no-cache: true
          tags: |
            ghcr.io/alexandremagnier04/gustichef:latest
            ghcr.io/alexandremagnier04/gustichef:${{ github.sha }}
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
