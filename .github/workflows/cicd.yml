name: CI — Gustichef

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Vérification des types
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Installation des dépendances
        run: pnpm install --frozen-lockfile

      - name: Lint (Prettier + ESLint)
        run: pnpm lint

      - name: Vérification TypeScript
        run: pnpm check

  test-unit:
    name: Tests unitaires (Vitest)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Installation des dépendances
        run: pnpm install --frozen-lockfile

      - name: Tests unitaires
        run: pnpm test:unit

      - name: Upload du rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  test-e2e:
    name: Tests E2E (Playwright)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
      BETTER_AUTH_SECRET: ci-secret-not-for-production
      ORIGIN: http://localhost:4173
      GOOGLE_CLIENT_ID: ''
      GOOGLE_CLIENT_SECRET: ''

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Installation des dépendances
        run: pnpm install --frozen-lockfile

      - name: Push du schéma DB
        run: pnpm db:push

      - name: Installation de Playwright (Chromium uniquement)
        run: pnpm exec playwright install --with-deps chromium

      - name: Build de l'application
        run: pnpm build

      - name: Tests E2E
        run: pnpm test:e2e

      - name: Upload des rapports Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    name: Build de production
    runs-on: ubuntu-latest
    needs: [test-unit, test-e2e]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Installation des dépendances
        run: pnpm install --frozen-lockfile

      - name: Build de production
        env:
          BETTER_AUTH_SECRET: ci-secret-not-for-production
          ORIGIN: https://gustichef.vercel.app
        run: pnpm build

      - name: Upload de l'artefact de build
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .svelte-kit/
          retention-days: 1
